services:

  nginx: 
    build: ./nginx
    ports: 
        - "80:80"
    depends_on: 
      - server
      - client
  server:
    build: ./server
    volumes: 
        - ./server:/var/www/html
    environment:
      - DB_HOST=postgres
      - MONGO_HOST=mongo
      - REDIS_HOST=redis

  client:
    build: ./client
    ports:
      - "3000:3000"
    environment: 
    - CHOKIDAR_USEPOLLING=true

  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: blog
    volumes:
      - ./postgres/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql

  mongo:
    image: mongo:latest
    environment:
     - MONGO_INITDB_DATABASE=blog 
    volumes:
      - ./mongo/01-seed.js:/docker-entrypoint-initdb.d/01-seed.js:ro

  redis:
    image: redis:alpine